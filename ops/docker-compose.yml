services:
  backend:
    build:
      context: ../backend
    env_file:
      - ../backend/.env
    ports:
      - "5000:5000"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  nginx:
    image: nginx:1.25-alpine
    volumes:
      - ./nginx/frontend.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/rtmp_server.conf:/etc/nginx/conf.d/rtmp_server.conf:ro
    ports:
      - "80:80"
